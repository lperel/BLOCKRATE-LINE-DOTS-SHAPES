<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1830" />
  <title>BlockRate Debug Verifier</title>
  <style>
    :root{
      --bg:#091426; --bg2:#132746; --panel:#0d1b33; --panel2:#10213e;
      --text:#eef7ff; --muted:#9eb7d6; --edge:#28476e; --accent:#67c6ff;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; min-height:100svh; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background:radial-gradient(circle at 50% 12%, rgba(103,198,255,.12), transparent 25%),linear-gradient(135deg,var(--bg2),var(--bg) 58%, #060c16);
    }
    .app{max-width:900px;margin:0 auto;padding:16px;display:grid;gap:14px}
    .title{font-size:28px;font-weight:800;text-align:center;margin:0}
    .sub{font-size:13px;color:var(--muted);text-align:center}
    .panel{
      border:1px solid var(--edge); border-radius:20px; padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), var(--panel);
    }
    .layout{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
    .well{
      border:1px solid var(--edge); border-radius:18px; padding:12px; background:#0b172a;
    }
    .ringgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .cell,.btncell{
      min-height:110px; border:1px solid var(--edge); border-radius:16px;
      display:flex; align-items:center; justify-content:center; background:#0a1629;
    }
    .btncell{cursor:pointer}
    .btncell:active{transform:scale(.98)}
    .target{
      width:180px;height:180px;border-radius:999px;border:2px solid rgba(103,198,255,.28);
      margin:0 auto;display:flex;align-items:center;justify-content:center;background:#0d1b33;
    }
    .shapeHolder{width:88px;height:88px;display:flex;align-items:center;justify-content:center}
    .shapeSvg{width:84px;height:84px;overflow:visible}
    .shapeStroke{stroke:var(--accent);stroke-width:2.4;fill:#10203d}
    .controls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    button{
      border:1px solid var(--edge);border-radius:14px;background:#0d1b33;color:var(--text);font-size:15px;padding:12px 10px;
    }
    .debug{
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:12px; line-height:1.5; white-space:pre-wrap;
      background:#081220; border:1px solid var(--edge); border-radius:14px; padding:12px;
    }
    .ok{color:#9fffb0}
    .bad{color:#ffb0b0}
    .status{font-size:14px;text-align:center;color:var(--muted);min-height:20px}
    @media (max-width: 780px){
      .layout{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">BlockRate Debug Verifier</h1>
    <div class="sub">Purpose: verify every generated trial visually before restoring pacing. Left upper field uses intermixed dots and lines.</div>

    <div class="layout">
      <div class="panel">
        <div class="well" style="margin-bottom:12px">
          <div class="target" id="probeCircle">Ready</div>
        </div>
        <div class="well" style="margin-bottom:12px">
          <div style="margin-bottom:8px;color:var(--muted)">Upper field (intermixed dots + lines)</div>
          <div class="ringgrid" id="upper"></div>
        </div>
        <div class="well">
          <div style="margin-bottom:8px;color:var(--muted)">Lower response field</div>
          <div class="ringgrid" id="buttons"></div>
        </div>
      </div>

      <div class="panel">
        <div class="controls" style="margin-bottom:12px">
          <button id="newTrialBtn">New Trial</button>
          <button id="showAnswerBtn">Show Answer</button>
          <button id="run100Btn">Validate 100</button>
          <button id="clearBtn">Clear</button>
        </div>
        <div class="status" id="statusLine"></div>
        <div class="debug" id="debugBox">No trial generated yet.</div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
